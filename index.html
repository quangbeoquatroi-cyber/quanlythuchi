<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu Chi Gia Đình 💕</title>
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="apple-touch-icon" href="assets/icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="assets/icon.png">
<link rel="apple-touch-icon" sizes="120x120" href="assets/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thu Chi">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d2b1e">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & ROOT ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#071a14;
  --s1:#0d2318;
  --s2:#112d1e;
  --s3:#163826;
  --s4:#1c4530;
  --border:#1f5035;
  --border2:#276644;
  --anh:#2dd4a0;
  --em:#f9a825;
  --green:#26d98b;
  --red:#ff5252;
  --blue:#448aff;
  --text:#e8eaf6;
  --muted:#6b9e80;
  --dim:#2d6b4a;
  --r:14px;
  --r2:10px;
  --sidebar:220px;
  --topbar:56px;
}
html{height:100%}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
a{text-decoration:none;color:inherit}

/* ── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ── LOGIN SCREEN ───────────────────────────────────────── */
#screen-login{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(45,212,160,.25),transparent),radial-gradient(ellipse 70% 50% at 20% 100%,rgba(38,217,139,.12),transparent),var(--bg);
}
.login-box{
  background:var(--s1);
  border:1px solid rgba(45,212,160,.2);
  border-radius:24px;
  padding:48px 40px;
  width:100%;max-width:400px;
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(45,212,160,.05),0 0 60px rgba(45,212,160,.06);
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{
  text-align:center;margin-bottom:32px;
}
.login-logo .logo-icon{font-size:48px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(249,168,37,.4))}
.login-logo h1{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:600;
  background:linear-gradient(135deg,#2dd4a0,#f9a825);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.form-group input{
  width:100%;background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r2);padding:12px 16px;
  color:var(--text);font-size:14px;
  transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus{border-color:#2dd4a0;box-shadow:0 0 0 3px rgba(45,212,160,.15)}
.login-btn{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,#2dd4a0,#16a87a);
  border-radius:var(--r2);color:#fff;
  font-size:15px;font-weight:800;letter-spacing:.02em;
  transition:opacity .2s,transform .1s;
}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-error{
  background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);
  border-radius:var(--r2);padding:10px 14px;
  color:var(--red);font-size:13px;margin-top:12px;
  display:none;
}
.login-error.show{display:block}

/* ── APP LAYOUT ─────────────────────────────────────────── */
#screen-app{display:none}
#screen-app.active{display:flex}
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  height:100vh;position:fixed;top:0;left:0;
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:100;overflow-y:auto;
}
.main{
  margin-left:var(--sidebar);
  flex:1;display:flex;flex-direction:column;min-height:100vh;
}

/* ── SIDEBAR ────────────────────────────────────────────── */
.sidebar-brand{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-brand .brand-icon{font-size:22px;display:block;text-align:center;margin-bottom:6px}
.sidebar-brand h2{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:600;text-align:center;
  background:linear-gradient(135deg,#2dd4a0,#f9a825);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.3;
}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-section-label{
  font-size:10px;font-weight:800;color:var(--dim);
  text-transform:uppercase;letter-spacing:.1em;
  padding:12px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--r2);
  font-size:13px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:all .15s;margin-bottom:2px;
}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.active{background:var(--s3);color:var(--text)}
.nav-item.active-anh{background:rgba(249,168,37,.12);color:var(--anh)}
.nav-item.active-em{background:rgba(236,64,122,.12);color:var(--em)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{
  padding:12px 8px;border-top:1px solid var(--border);flex-shrink:0;
}
.nav-item.logout{color:var(--muted)}
.nav-item.logout:hover{color:var(--red);background:rgba(255,82,82,.08)}

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar{
  height:var(--topbar);background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:50;
  flex-shrink:0;
}
.topbar-title{font-size:17px;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:12px}
.year-nav{display:flex;align-items:center;gap:4px}
.year-btn{
  background:var(--s3);border:1px solid var(--border);
  border-radius:8px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:14px;font-weight:700;
  transition:all .15s;
}
.year-btn:hover{background:var(--s4);color:var(--text)}
.year-label{
  font-size:15px;font-weight:800;color:var(--text);
  padding:0 8px;min-width:50px;text-align:center;
}
.btn-primary{
  background:linear-gradient(135deg,#2dd4a0,#16a87a);
  color:#000;padding:8px 16px;border-radius:var(--r2);
  font-size:13px;font-weight:800;
  transition:opacity .15s,transform .1s;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary.btn-em{background:linear-gradient(135deg,var(--em),#c2185b)}
.btn-primary.btn-quy{background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff}

/* ── CONTENT ────────────────────────────────────────────── */
.content{flex:1;padding:24px;overflow-y:auto}
.page{display:none}
.page.active{display:block}

/* ── MONTH CARDS ────────────────────────────────────────── */
.months-grid{display:flex;flex-direction:column;gap:16px}
.month-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:box-shadow .2s;
}
.month-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.3)}
.mc-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:8px;
}
.mc-title{font-size:15px;font-weight:800;flex:1}
.mc-badge{
  font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.08em;
}
.mc-badge-ok{background:rgba(38,217,139,.15);color:var(--green);border:1px solid rgba(38,217,139,.3)}
.mc-badge-over{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.3)}
.mc-btn{
  background:var(--s3);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;
  font-size:12px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:5px;
  transition:all .15s;
}
.mc-btn:hover{background:var(--s4);color:var(--text);border-color:var(--border2)}
.mc-summary{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--border);
}
.mc-sum-col{padding:14px 18px}
.mc-sum-col:first-child{border-right:1px solid var(--border)}
.mc-sum-label{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.mc-sum-amount{font-size:20px;font-weight:800}
.mc-sum-amount.income{color:var(--green)}
.mc-sum-amount.expense{color:var(--red)}
.mc-sum-count{font-size:12px;color:var(--muted);margin-top:3px}
.mc-footer{
  padding:12px 18px;
  display:flex;justify-content:space-between;align-items:center;
}
.mc-footer-stat{font-size:13px;color:var(--muted)}
.mc-footer-stat span{font-weight:700;color:var(--text)}
/* detail */
.mc-detail{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(0.4,0,0.2,1)}
.mc-detail.open{max-height:2000px}
.mc-detail-inner{border-top:1px solid var(--border)}
.mc-section{padding:14px 18px}
.mc-section+.mc-section{border-top:1px solid var(--border)}
.mc-section-title{
  font-size:11px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between;
}
.mc-section-title .section-total{color:var(--text);font-size:13px}
.mc-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;font-size:13px;
  border-bottom:1px solid rgba(46,48,80,.4);
}
.mc-row:last-child{border-bottom:none}
.mc-row-name{color:var(--muted);flex:1}
.mc-row-amount{font-weight:700;white-space:nowrap;padding-left:12px}
.mc-row-amount.positive{color:var(--green)}
.mc-row-amount.negative{color:var(--red)}

/* skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;height:150px;
  overflow:hidden;
}

/* ── QUY PAGE ───────────────────────────────────────────── */
.quy-header{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 24px;margin-bottom:16px;
}
.quy-header-top{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;
}
.quy-title-area{display:flex;align-items:center;gap:12px}
.quy-icon-big{font-size:32px}
.quy-name{font-size:20px;font-weight:800}
.quy-header-btns{display:flex;gap:8px}
.btn-outline{
  background:transparent;border:1px solid var(--border);
  border-radius:var(--r2);padding:7px 14px;
  font-size:13px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.btn-outline:hover{background:var(--s3);color:var(--text);border-color:var(--border2)}
.progress-bar-wrap{background:var(--s3);border-radius:100px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:100px;transition:width .5s ease}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--muted);margin-top:6px;
}
.quy-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-bottom:16px;
}
.stat-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px 16px;
}
.stat-card-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-card-value{font-size:18px;font-weight:800}
.stat-card-value.green{color:var(--green)}
.stat-card-value.red{color:var(--red)}
.stat-card-value.blue{color:var(--blue)}
.stat-card-value.anh{color:var(--anh)}
.stat-card-value.em{color:var(--em)}
.stat-card-value.muted{color:var(--muted)}

/* transaction table */
.tx-table-wrap{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
}
.tx-table-header{
  display:flex;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--s2);
  font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;
}
.tx-row{
  display:flex;padding:11px 16px;
  border-bottom:1px solid rgba(46,48,80,.4);
  font-size:13px;align-items:center;
  transition:background .15s;
}
.tx-row:last-child{border-bottom:none}
.tx-row:hover{background:var(--s2)}
.tx-row.total-row{
  background:var(--s2);border-top:2px solid var(--border2);
  font-weight:800;font-size:13px;
}
.tx-col-date{width:90px;flex-shrink:0;color:var(--muted)}
.tx-col-desc{flex:1;font-weight:600;padding:0 8px}
.tx-col-anh{width:130px;flex-shrink:0;text-align:right;font-weight:700}
.tx-col-em{display:none}
.tx-col-cat{display:none}
.tx-col-actions{width:90px;flex-shrink:0;display:flex;gap:6px;justify-content:flex-end}
.tx-act-btn{
  background:transparent;border:none;
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--dim);
  transition:all .15s;
}
.tx-act-btn:hover{background:var(--s4);color:var(--text)}
.tx-act-btn.del:hover{color:var(--red);background:rgba(255,82,82,.1)}
.cat-badge{
  font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:20px;
  background:var(--s3);color:var(--muted);
  display:inline-block;white-space:nowrap;
}
.tx-type-in{color:var(--green)!important}
.tx-type-out{color:var(--red)!important}

/* ── MODALS ─────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .2s;padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:18px;width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(16px) scale(.97);
  transition:transform .25s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 40px 100px rgba(0,0,0,.6);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--s2);z-index:5;border-radius:18px 18px 0 0;
}
.modal-title{font-size:16px;font-weight:800}
.modal-close{
  background:var(--s3);border:none;border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:16px;cursor:pointer;
  transition:all .15s;
}
.modal-close:hover{background:var(--s4);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
  position:sticky;bottom:0;background:var(--s2);border-radius:0 0 18px 18px;
}
.btn-cancel{
  background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r2);padding:9px 18px;
  font-size:14px;font-weight:700;color:var(--muted);
  transition:all .15s;
}
.btn-cancel:hover{background:var(--s4);color:var(--text)}
.btn-save{
  background:linear-gradient(135deg,var(--anh),#f57c00);
  border-radius:var(--r2);padding:9px 20px;
  font-size:14px;font-weight:800;color:#000;
  transition:opacity .15s;min-width:100px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-save:hover{opacity:.9}
.btn-save.loading{opacity:.7;cursor:not-allowed}
.btn-save.btn-em-save{background:linear-gradient(135deg,var(--em),#c2185b);color:#fff}
.btn-save.btn-quy-save{background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff}

/* form fields inside modal */
.field-group{margin-bottom:16px}
.field-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block}
.field-input{
  width:100%;background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r2);padding:10px 14px;
  color:var(--text);font-size:14px;
  transition:border-color .2s,box-shadow .2s;
}
.field-input:focus{border-color:var(--anh);box-shadow:0 0 0 3px rgba(249,168,37,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* items editor (thu chi) */
.items-editor{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.item-row{
  display:flex;gap:0;align-items:center;
  background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r2);padding:0;overflow:hidden;
}
.item-row input{
  background:transparent;border:none;
  color:var(--text);font-size:13px;padding:10px 12px;
}
.item-row .item-name{flex:1;border-right:1px solid var(--border2)!important}
.item-row .item-amount{
  width:140px;text-align:right;font-weight:700;
  border-right:1px solid var(--border2)!important;
  padding-right:10px!important;
  flex-shrink:0;
}
.item-row .item-del{
  background:transparent;border:none;color:var(--dim);font-size:15px;
  cursor:pointer;padding:0 12px;line-height:1;height:100%;
  transition:color .15s, background .15s;flex-shrink:0;
}
.item-row .item-del:hover{color:var(--red);background:rgba(239,68,68,.08)}
.add-item-btn{
  background:transparent;border:1px dashed var(--border2);
  border-radius:var(--r2);padding:8px;
  color:var(--muted);font-size:13px;font-weight:700;
  width:100%;text-align:center;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-item-btn:hover{background:var(--s3);color:var(--text);border-color:var(--muted)}
.section-sep{
  font-size:11px;font-weight:800;color:var(--dim);
  text-transform:uppercase;letter-spacing:.1em;
  padding:12px 0 6px;border-top:1px solid var(--border);margin-top:8px;
}

/* ── TOAST ──────────────────────────────────────────────── */
#toast-container{
  position:fixed;bottom:24px;right:24px;
  z-index:1000;display:flex;flex-direction:column;gap:8px;
}
.toast{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r2);padding:12px 16px;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:slideInRight .3s ease;
  min-width:220px;max-width:320px;
}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success .toast-icon{color:var(--green)}
.toast.error .toast-icon{color:var(--red)}
.toast.info .toast-icon{color:var(--blue)}
.toast-msg{flex:1}
.toast-dismiss{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;line-height:1;padding:0}
.toast-dismiss:hover{color:var(--text)}

/* ── EMPTY STATE ────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--muted);
}
.empty-state .empty-icon{font-size:48px;display:block;margin-bottom:12px;opacity:.5}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text);opacity:.6}
.empty-state p{font-size:13px}

/* spinner */
.spinner{
  width:16px;height:16px;border:2px solid rgba(0,0,0,.2);
  border-top-color:#000;border-radius:50%;
  animation:spin .6s linear infinite;flex-shrink:0;
}
.spinner.white{border:2px solid rgba(255,255,255,.2);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ─────────────────────────────────────────── */

/* ── TABLET (max 1024px) ── */
@media(max-width:1024px){
  :root{--sidebar:190px}
  .quy-stats{grid-template-columns:repeat(2,1fr)}
  .tx-col-cat{display:none}
  .mc-sum-amount{font-size:17px}
}

/* ── MOBILE (max 700px) ── */
@media(max-width:700px){
  :root{
    --sidebar:0px;
    --topbar:52px;
  }

  /* Sidebar becomes bottom nav */
  .sidebar{
    width:100%;height:auto;
    position:fixed;bottom:0;left:0;top:auto;
    flex-direction:row;overflow-x:auto;overflow-y:hidden;
    border-right:none;border-top:1px solid var(--border);
    z-index:200;padding:0;
    -webkit-overflow-scrolling:touch;
  }
  .sidebar-brand{display:none}
  .sidebar-nav{
    display:flex;flex-direction:row;
    padding:0;flex:1;overflow-x:auto;
    gap:0;
  }
  .nav-section-label{display:none}
  .nav-item{
    flex-direction:column;gap:2px;min-width:56px;
    padding:8px 6px;font-size:10px;
    border-radius:0;text-align:center;
    justify-content:center;align-items:center;
    white-space:nowrap;
  }
  .nav-item .nav-icon{font-size:20px;width:auto}
  .sidebar-footer{
    padding:0;border-top:none;border-left:1px solid var(--border);
    flex-shrink:0;
  }
  .nav-item.logout{flex-direction:column;gap:2px;padding:8px 6px;font-size:10px}

  /* Main adjusts for bottom nav */
  .main{
    margin-left:0;
    padding-bottom:70px;
  }

  /* Topbar */
  .topbar{padding:0 12px;height:var(--topbar)}
  .topbar-title{font-size:14px}
  .year-label{font-size:13px;min-width:40px}
  .btn-primary{font-size:12px;padding:7px 11px}
  .btn-primary span{display:none}

  /* Content */
  .content{padding:12px}

  /* Month cards */
  .mc-header{padding:10px 12px;gap:6px}
  .mc-title{font-size:14px}
  .mc-btn{padding:4px 8px;font-size:11px}
  .mc-sum-col{padding:10px 12px}
  .mc-sum-amount{font-size:16px}
  .mc-sum-label{font-size:10px}
  .mc-sum-count{font-size:11px}
  .mc-footer{padding:8px 12px;flex-wrap:wrap;gap:4px}
  .mc-footer-stat{font-size:12px}
  .mc-section{padding:10px 12px}
  .mc-row{font-size:12px}

  /* Quy page */
  .quy-header{padding:14px 16px}
  .quy-name{font-size:16px}
  .quy-icon-big{font-size:24px}
  .quy-stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:10px 12px}
  .stat-card-value{font-size:15px}

  /* Transaction table */
  .tx-table-header{display:none}
  .tx-row{
    flex-wrap:wrap;padding:10px 12px;gap:2px 4px;
  }
  .tx-col-date{width:auto;font-size:11px;color:var(--muted)}
  .tx-col-desc{flex:1;min-width:0;font-size:13px;padding:0}
  .tx-col-anh{width:auto;font-size:12px;text-align:right}
  .tx-col-em{display:none}
  .tx-col-cat{display:none}
  .tx-col-actions{
    flex-shrink:0;
    width:auto;
    display:flex;gap:4px;
  }

  /* Modals */
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{
    border-radius:18px 18px 0 0;
    max-height:92vh;
    max-width:100%!important;
  }
  .modal-header{border-radius:18px 18px 0 0;padding:16px 18px 12px}
  .modal-body{padding:14px 18px}
  .modal-footer{padding:12px 18px}
  .field-row,.field-row-3{grid-template-columns:1fr!important}

  /* Item rows in month modal */
  .item-row{gap:0;padding:0}
  .item-row input{padding:9px 10px;font-size:13px}
  .item-row .item-amount{width:110px;font-size:13px}
  .item-row .item-name{font-size:13px}

  /* Toast */
  #toast-container{bottom:80px;right:12px;left:12px}
  .toast{min-width:auto;max-width:100%}

  /* Login box */
  .login-box{padding:28px 20px;border-radius:16px}
}

/* ── VERY SMALL (max 400px) ── */
@media(max-width:400px){
  .mc-summary{grid-template-columns:1fr}
  .mc-sum-col:first-child{border-right:none;border-bottom:1px solid var(--border)}
  .quy-stats{grid-template-columns:1fr 1fr}
}

/* ── MENU TOGGLE (mobile only) ─────────────────────────── */
.menu-toggle{
  display:none;
  background:transparent;border:none;
  flex-direction:column;gap:5px;
  padding:4px;cursor:pointer;
  width:32px;flex-shrink:0;
}
.menu-toggle span{
  display:block;width:22px;height:2px;
  background:var(--muted);border-radius:2px;
  transition:all .2s;
}
.menu-toggle:hover span{background:var(--text)}
@media(max-width:700px){
  .menu-toggle{display:flex}
}

/* Sidebar overlay on mobile */
.sidebar-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:199;
}
.sidebar-overlay.show{display:block}
@media(max-width:700px){
  .sidebar{
    transform:translateX(-100%);
    transition:transform .25s ease;
    flex-direction:column;
    width:240px!important;height:100vh!important;
    bottom:auto!important;left:0;top:0;
    overflow-y:auto;overflow-x:hidden;
    position:fixed;
  }
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-brand{display:flex!important}
  .sidebar-nav{flex-direction:column;padding:12px 8px}
  .nav-section-label{display:block}
  .nav-item{
    flex-direction:row;font-size:13px;
    padding:9px 10px;min-width:auto;
    border-radius:var(--r2);text-align:left;
    justify-content:flex-start;
  }
  .nav-item .nav-icon{font-size:16px;width:20px}
  .sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);border-left:none}
  .nav-item.logout{flex-direction:row;font-size:13px;padding:9px 10px}
  .main{padding-bottom:0}
  #toast-container{bottom:16px}
}
.btn-short-text{display:none}
@media(max-width:700px){
  .btn-full-text{display:none}
  .btn-short-text{display:inline;font-size:16px;font-weight:900}
  .btn-primary{padding:7px 12px!important}
}
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--muted)}
.font-mono{font-variant-numeric:tabular-nums}
select.field-input option{background:var(--s2)}
</style>
</head>

<!-- ════════════════ SCRIPT ════════════════ -->
<script>
// ── MOBILE MENU ──────────────────────────────────────────
function toggleMobileMenu() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');

  overlay.classList.toggle('show');
}
function closeMobileMenu() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL     = 'https://rnsjiqbbeywgbnqsojce.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJuc2ppcWJiZXl3Z2JucXNvamNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTExNjAsImV4cCI6MjA5MzA2NzE2MH0.1BrlS__GNAMFbBmudl6gUJwJ9j_zoDdAj9rtfhBkhdk';

// ── INIT SUPABASE ────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── APP STATE ────────────────────────────────────────────
const S = {
  page: 'anh',
  year: new Date().getFullYear(),
  bdtCache: { anh: {}, em: {} },
  quyCache: {},
  expandedCards: new Set(),
  editMonthId: null,
  editTxId: null,
  editTxQuyId: null,
  editCfgQuyId: null,
};

// ── HELPERS ──────────────────────────────────────────────
const fmtVND = n => {
  if(!n) return '0 ₫';
  return Math.abs(n).toLocaleString('vi-VN') + ' ₫';
};
const fmtVNDSign = n => {
  if(!n && n!==0) return '0 ₫';
  const sign = n < 0 ? '-' : '';
  return sign + Math.abs(n).toLocaleString('vi-VN') + ' ₫';
};
const fmtDate = d => {
  if(!d) return '';
  const dd = new Date(d);
  return dd.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
};
const today = () => new Date().toISOString().slice(0,10);
const BDT_PAGES = ['anh','em'];
const QUY_PAGES = ['henho','cuoi','tuthien','dulich','backup'];

// ── AUTH ─────────────────────────────────────────────────
sb.auth.onAuthStateChange((evt, session) => {
  if(session) initApp();
  else showLogin();
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  err.classList.remove('show');
  btn.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px"><div class="spinner"></div> Đang đăng nhập...</div>';
  btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error) {
    err.textContent = 'Sai email hoặc mật khẩu!';
    err.classList.add('show');
    btn.innerHTML = 'Đăng nhập';
    btn.disabled = false;
  }
}

async function doSignOut() {
  await sb.auth.signOut();
}

function showLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-app').classList.remove('active');
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});

// ── INIT ─────────────────────────────────────────────────
async function initApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').classList.add('active');
  await Promise.all([
    loadBDTYear('anh', S.year),
    loadBDTYear('em',  S.year),
    loadAllQuy()
  ]);
  navigateTo(S.page);
}

// ── NAVIGATION ───────────────────────────────────────────
function navigateTo(page) {
  S.page = page;
  closeMobileMenu();
  // Update nav items
  document.querySelectorAll('.nav-item[id^="nav-"]').forEach(el => {
    el.classList.remove('active','active-anh','active-em');
  });
  const navEl = document.getElementById('nav-'+page);
  if(navEl) {
    if(page==='anh') navEl.classList.add('active-anh');
    else if(page==='em') navEl.classList.add('active-em');
    else navEl.classList.add('active');
  }
  // Show/hide pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  // Topbar
  const titles = {
    anh:'👨 Của Anh', em:'👩 Của Em',
    henho:'💕 Quỹ Hẹn Hò', cuoi:'💍 Quỹ Nhẫn Cưới',
    tuthien:'❤️ Quỹ Từ Thiện', dulich:'✈️ Quỹ Du Lịch', backup:'🛡️ Quỹ Backup'
  };
  document.getElementById('topbar-title').textContent = titles[page] || '';
  document.getElementById('year-nav').style.display = BDT_PAGES.includes(page) ? 'flex' : 'none';
  const addBtn = document.getElementById('topbar-add-btn');
  if(BDT_PAGES.includes(page)) {
    addBtn.textContent = '+ Thêm Tháng';
    addBtn.className = 'btn-primary' + (page==='em' ? ' btn-em' : '');
    addBtn.style.display = '';
  } else {
    addBtn.style.display = 'none';
  }
  renderPage(page);
}

function topbarAddClick() {
  if(BDT_PAGES.includes(S.page)) openMonthModal(null);
  else openTxModal(null, S.page);
}

// ── YEAR ─────────────────────────────────────────────────
function changeYear(delta) {
  S.year += delta;
  document.getElementById('year-label').textContent = S.year;
  const owner = S.page;
  if(!BDT_PAGES.includes(owner)) return;
  showSkeletons(owner);
  loadBDTYear(owner, S.year).then(() => renderPage(owner));
}

// ── BDT DATA ─────────────────────────────────────────────
async function loadBDTYear(owner, year) {
  const { data, error } = await sb.from('bdt_months')
    .select('*, bdt_items(*)')
    .eq('owner', owner)
    .eq('year', year)
    .order('month', {ascending: false});
  if(error) { console.error(error); return; }
  if(!S.bdtCache[owner]) S.bdtCache[owner] = {};
  if(!S.bdtCache[owner][year]) S.bdtCache[owner][year] = {};
  (data || []).forEach(m => {
    S.bdtCache[owner][year][m.month] = {
      id: m.id,
      items: m.bdt_items || []
    };
  });
}

async function saveBDTMonth(owner, year, month, incomeItems, expenseItems) {
  const { data: mo, error } = await sb.from('bdt_months')
    .upsert({ owner, year, month, updated_at: new Date().toISOString() }, { onConflict: 'owner,year,month' })
    .select().single();
  if(error) throw error;
  await sb.from('bdt_items').delete().eq('month_id', mo.id);
  const items = [
    ...incomeItems.map((i,idx) => ({ month_id: mo.id, type:'income', name: i.name, amount: i.amount, sort_order: idx })),
    ...expenseItems.map((i,idx) => ({ month_id: mo.id, type:'expense', name: i.name, amount: i.amount, sort_order: idx })),
  ];
  if(items.length) {
    const { error: ie } = await sb.from('bdt_items').insert(items);
    if(ie) throw ie;
  }
  // Update cache
  if(!S.bdtCache[owner][year]) S.bdtCache[owner][year] = {};
  // Reload this month
  const { data: fresh } = await sb.from('bdt_months')
    .select('*, bdt_items(*)')
    .eq('id', mo.id).single();
  if(fresh) S.bdtCache[owner][year][month] = { id: fresh.id, items: fresh.bdt_items || [] };
}

// ── QUY DATA ─────────────────────────────────────────────
async function loadAllQuy() {
  const { data, error } = await sb.from('quy')
    .select('*, quy_transactions(*)')
    .order('sort_order');
  if(error) { console.error(error); return; }
  (data || []).forEach(q => {
    S.quyCache[q.key] = { ...q, transactions: q.quy_transactions || [] };
  });
}

async function saveQuyConfigData(quyId, cfg) {
  const { error } = await sb.from('quy').update({ name:cfg.name, icon:cfg.icon, color:cfg.color, target:cfg.target }).eq('id', quyId);
  if(error) throw error;
}

async function addQuyTx(quyId, txData) {
  const { data, error } = await sb.from('quy_transactions').insert({ quy_id: quyId, ...txData }).select().single();
  if(error) throw error;
  return data;
}

async function updateQuyTx(txId, txData) {
  const { error } = await sb.from('quy_transactions').update({ ...txData, updated_at: new Date().toISOString() }).eq('id', txId);
  if(error) throw error;
}

async function deleteQuyTx(txId) {
  const { error } = await sb.from('quy_transactions').delete().eq('id', txId);
  if(error) throw error;
}

// ── RENDER PAGES ─────────────────────────────────────────
function renderPage(page) {
  if(BDT_PAGES.includes(page)) renderBDT(page);
  else renderQuy(page);
}

function showSkeletons(owner) {
  const el = document.getElementById('page-'+owner);
  el.innerHTML = [1,2,3].map(() => `<div class="skeleton-card"><div class="skeleton" style="height:20px;width:120px;margin-bottom:12px"></div><div class="skeleton" style="height:14px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div>`).join('');
}

function renderBDT(owner) {
  const el = document.getElementById('page-'+owner);
  const yearData = S.bdtCache[owner][S.year] || {};
  const months = Object.keys(yearData).map(Number).sort((a,b)=>b-a);
  if(!months.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">📅</span><h3>Chưa có dữ liệu năm ${S.year}</h3><p>Nhấn "+ Thêm Tháng" để bắt đầu</p></div>`;
    return;
  }
  el.innerHTML = `<div class="months-grid">${months.map(m => renderMonthCard(owner, S.year, m)).join('')}</div>`;
}

function renderMonthCard(owner, year, month) {
  const d = S.bdtCache[owner][year][month];
  if(!d) return '';
  const incomes  = d.items.filter(i => i.type === 'income');
  const expenses = d.items.filter(i => i.type === 'expense');
  const totalIncome  = incomes.reduce((s,i) => s + (i.amount||0), 0);
  const totalExpense = expenses.reduce((s,i) => s + (i.amount||0), 0);
  const netIncome    = totalIncome;
  const remaining    = netIncome - totalExpense;
  const isOpen       = S.expandedCards.has(`${owner}-${year}-${month}`);
  const badgeCls     = remaining >= 0 ? 'mc-badge-ok' : 'mc-badge-over';
  const badgeTxt     = remaining >= 0 ? '✓ Ổn' : '⚠ Vượt';

  const incomeRows = incomes.map(i => `
    <div class="mc-row">
      <span class="mc-row-name">${i.name}</span>
      <span class="mc-row-amount ${i.amount>=0?'positive':'negative'}">${i.amount>=0?'':'-'}${fmtVND(i.amount)}</span>
    </div>`).join('');
  const expenseRows = expenses.map(i => `
    <div class="mc-row">
      <span class="mc-row-name">${i.name}</span>
      <span class="mc-row-amount negative">${fmtVND(i.amount)}</span>
    </div>`).join('');

  return `
  <div class="month-card" id="mc-${owner}-${year}-${month}">
    <div class="mc-header">
      <span class="mc-title">Tháng ${month}${month===13?' 🎁':''}</span>
      <span class="mc-badge ${badgeCls}">${badgeTxt}</span>
      <button class="mc-btn" onclick="openMonthModal('${owner}',${year},${month})">✏️ Sửa</button>
      <button class="mc-btn" onclick="toggleMonthDetail('${owner}',${year},${month})">
        ${isOpen ? '✕ Ẩn bớt' : '☰ Chi tiết'}
      </button>
    </div>
    <div class="mc-summary">
      <div class="mc-sum-col">
        <div class="mc-sum-label">💚 Thu Ròng</div>
        <div class="mc-sum-amount income font-mono">${fmtVND(totalIncome)}</div>
        <div class="mc-sum-count">${incomes.length} khoản</div>
      </div>
      <div class="mc-sum-col">
        <div class="mc-sum-label">🔴 Khoản Chi</div>
        <div class="mc-sum-amount expense font-mono">${fmtVND(totalExpense)}</div>
        <div class="mc-sum-count">${expenses.length} khoản</div>
      </div>
    </div>
    <div class="mc-detail ${isOpen?'open':''}" id="mcd-${owner}-${year}-${month}">
      <div class="mc-detail-inner">
        <div class="mc-section">
          <div class="mc-section-title">
            <span>● Chi tiết nguồn thu</span>
            <span class="section-total">${fmtVND(totalIncome)}</span>
          </div>
          ${incomeRows || '<div class="text-muted" style="font-size:13px">Chưa có khoản thu</div>'}
        </div>
        <div class="mc-section">
          <div class="mc-section-title">
            <span>● Chi tiết khoản chi</span>
            <span class="section-total">${fmtVND(totalExpense)}</span>
          </div>
          ${expenseRows || '<div class="text-muted" style="font-size:13px">Chưa có khoản chi</div>'}
        </div>
      </div>
    </div>
    <div class="mc-footer">
      <span class="mc-footer-stat">Thu ròng: <span>${fmtVND(netIncome)}</span></span>
      <span class="mc-footer-stat">Còn lại: <span style="color:${remaining>=0?'var(--green)':'var(--red)'}">${fmtVNDSign(remaining)}</span></span>
    </div>
  </div>`;
}

function toggleMonthDetail(owner, year, month) {
  const key = `${owner}-${year}-${month}`;
  const el  = document.getElementById(`mcd-${owner}-${year}-${month}`);
  if(!el) return;
  if(S.expandedCards.has(key)) {
    S.expandedCards.delete(key);
    el.classList.remove('open');
  } else {
    S.expandedCards.add(key);
    el.classList.add('open');
  }
  // Update button text
  const card = document.getElementById(`mc-${owner}-${year}-${month}`);
  if(card) {
    const btns = card.querySelectorAll('.mc-btn');
    if(btns[1]) btns[1].textContent = S.expandedCards.has(key) ? '✕ Ẩn bớt' : '☰ Chi tiết';
  }
}

// ── QUY RENDER ───────────────────────────────────────────
function renderQuy(key) {
  const el  = document.getElementById('page-'+key);
  const q   = S.quyCache[key];
  if(!q) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">⏳</span><h3>Đang tải...</h3></div>`;
    return;
  }
  const txs = q.transactions || [];
  const totalIn    = txs.filter(t=>t.type==='in').reduce((s,t)=>s+(t.amount_anh||0)+(t.amount_em||0),0);
  const totalOut   = txs.filter(t=>t.type==='out').reduce((s,t)=>s+(t.amount_anh||0)+(t.amount_em||0),0);
  const balance    = totalIn - totalOut;
  const target     = q.target || 0;
  const pct        = target > 0 ? Math.min(100, Math.round(balance/target*100)) : 0;
  const anhIn      = txs.filter(t=>t.type==='in').reduce((s,t)=>s+(t.amount_anh||0),0);
  const emIn       = txs.filter(t=>t.type==='in').reduce((s,t)=>s+(t.amount_em||0),0);
  const lacking    = Math.max(0, target - balance);

  const txRows = [...txs].sort((a,b)=> b.date.localeCompare(a.date)).map(t => {
    const isIn   = t.type === 'in';
    const anhAmt = t.amount_anh||0;
    const emAmt  = t.amount_em||0;
    const totalAmt = anhAmt + emAmt;
    return `
    <div class="tx-row">
      <div class="tx-col-date">${fmtDate(t.date)}</div>
      <div class="tx-col-desc">
        <span style="margin-right:6px">${isIn?'📥':'📤'}</span>
        ${t.description||'—'}
        ${t.note?`<span style="color:var(--muted);font-size:12px;margin-left:6px">(${t.note})</span>`:''}
      </div>
      <div class="tx-col-anh ${isIn?'tx-type-in':'tx-type-out'}">${totalAmt?fmtVND(totalAmt):'—'}</div>
      <div class="tx-col-actions">
        <button class="tx-act-btn" onclick="openTxDetail('${t.id}','${key}')" title="Xem chi tiết">🔍</button>
        <button class="tx-act-btn" onclick="openTxModal('${t.id}','${key}')" title="Sửa">✏️</button>
        <button class="tx-act-btn del" onclick="confirmDeleteTx('${t.id}','${key}')" title="Xóa">🗑</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
  <div class="quy-header">
    <div class="quy-header-top">
      <div class="quy-title-area">
        <span class="quy-icon-big">${q.icon||'💰'}</span>
        <div>
          <div class="quy-name">${q.name}</div>
          ${target>0?`<div style="font-size:12px;color:var(--muted)">Mục tiêu: ${fmtVND(target)}</div>`:''}
        </div>
      </div>
      <div class="quy-header-btns">
        <button class="btn-outline" onclick="openQuyConfig('${key}')">⚙️ Cài đặt</button>
        <button class="btn-primary btn-quy" onclick="openTxModal(null,'${key}')">+ Giao dịch</button>
      </div>
    </div>
    ${target>0?`
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%;background:${q.color||'var(--anh)'}"></div>
    </div>
    <div class="progress-label">
      <span style="color:${q.color||'var(--anh)'};font-weight:700">${pct}% đạt mục tiêu</span>
      <span>${fmtVND(balance)} / ${fmtVND(target)}</span>
    </div>`:''}
  </div>
  <div class="quy-stats">
    <div class="stat-card"><div class="stat-card-label">📥 Đã nạp</div><div class="stat-card-value green font-mono">${fmtVND(totalIn)}</div></div>
    <div class="stat-card"><div class="stat-card-label">📤 Đã chi</div><div class="stat-card-value red font-mono">${fmtVND(totalOut)}</div></div>
    <div class="stat-card"><div class="stat-card-label">💰 Còn lại</div><div class="stat-card-value font-mono" style="color:${q.color||'var(--anh)'}">${fmtVND(balance)}</div></div>
    <div class="stat-card"><div class="stat-card-label">👨 Anh đóng</div><div class="stat-card-value anh font-mono">${fmtVND(anhIn)}</div></div>
    <div class="stat-card"><div class="stat-card-label">👩 Em đóng</div><div class="stat-card-value em font-mono">${fmtVND(emIn)}</div></div>
    <div class="stat-card"><div class="stat-card-label">⚠️ Còn thiếu</div><div class="stat-card-value muted font-mono">${lacking>0?fmtVND(lacking):'Đã đủ 🎉'}</div></div>
  </div>
  <div class="tx-table-wrap">
    <div class="tx-table-header">
      <div class="tx-col-date">Ngày</div>
      <div class="tx-col-desc">Mô tả</div>
      <div class="tx-col-anh">Tiền</div>
      <div class="tx-col-actions"></div>
    </div>
    ${txRows || `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Chưa có giao dịch nào</div>`}
  </div>`;
}

// ── MONTH MODAL ──────────────────────────────────────────
function openMonthModal(owner, year, month) {
  S.editMonthOwner = owner || S.page;
  S.editMonthYear  = year  || S.year;
  S.editMonth      = month || null;
  document.getElementById('modal-month-title').textContent = month ? `Sửa Tháng ${month}${month===13?' 🎁':''}` : 'Thêm Tháng';
  const sel = document.getElementById('month-select'); const targetMonth = month || new Date().getMonth()+1; sel.innerHTML = Array.from({length:13},(_,i)=>{const m=i+1; return `<option value="${m}"${m===targetMonth?' selected':''}>Tháng ${m}${m===13?' 🎁 (Thưởng)':''}</option>`;}).join('');
  document.getElementById('month-year-input').value = year || S.year;
  const iEl = document.getElementById('income-items');
  const eEl = document.getElementById('expense-items');
  iEl.innerHTML = '';
  eEl.innerHTML = '';

  const saveBtn = document.getElementById('btn-save-month');
  saveBtn.className = 'btn-save' + (S.editMonthOwner==='em' ? ' btn-em-save' : '');

  if(month) {
    const d = (S.bdtCache[S.editMonthOwner][year] || {})[month];
    if(d) {
      d.items.filter(i=>i.type==='income').forEach(i => addItemRow('income', i.name, i.amount));
      d.items.filter(i=>i.type==='expense').forEach(i => addItemRow('expense', i.name, i.amount));
    }
  }
  openModalById('modal-month');
}

function formatAmountDisplay(val) {
  const n = parseFloat(String(val).replace(/[.,\s]/g,'').replace(/[^0-9]/g,''));
  if(!n || isNaN(n)) return '';
  return n.toLocaleString('vi-VN');
}

function parseAmountInput(val) {
  return parseFloat(String(val).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.]/g,'')) || 0;
}

function addItemRow(type, name='', amount='') {
  const container = document.getElementById(type+'-items');
  const row = document.createElement('div');
  row.className = 'item-row';
  const displayVal = amount ? formatAmountDisplay(amount) : '';
  row.innerHTML = `
    <input class="item-name" placeholder="Tên khoản..." value="${name}">
    <input class="item-amount" type="text" inputmode="numeric" placeholder="0" value="${displayVal}" style="color:${type==='income'?'var(--green)':'var(--red)'}">
    <button class="item-del" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);

  const amtInput = row.querySelector('.item-amount');
  amtInput.addEventListener('input', function() {
    // Strip everything except digits
    const digits = this.value.replace(/\D/g, '');
    if (!digits) { this.value = ''; return; }
    const num = parseInt(digits, 10);
    // Format with dots (vi-VN style)
    const formatted = num.toLocaleString('vi-VN');
    // Preserve cursor at end
    this.value = formatted;
  });
  row.querySelector('.item-name').focus();
}

async function saveMonth() {
  const btn    = document.getElementById('btn-save-month');
  const month  = parseInt(document.getElementById('month-select').value);
  const year   = parseInt(document.getElementById('month-year-input').value);
  const owner  = S.editMonthOwner;

  const readItems = type => {
    return Array.from(document.querySelectorAll(`#${type}-items .item-row`))
      .map(row => ({
        name:   row.querySelector('.item-name').value.trim(),
        amount: parseAmountInput(row.querySelector('.item-amount').value),
      }))
      .filter(i => i.name);
  };
  const incomeItems  = readItems('income');
  const expenseItems = readItems('expense');

  await withLoading(btn, async () => {
    await saveBDTMonth(owner, year, month, incomeItems, expenseItems);
    closeModalById('modal-month');
    renderBDT(owner);
  }, '✅ Đã lưu tháng!');
}

// ── TX MODAL ─────────────────────────────────────────────

  } else if(emAmt) {

      }

        font-size:14px;font-weight:700;color:var(--text);text-align:right;max-width:60%;
      }

    <!-- Hero amount block -->
    <div style="
      background:${accentBg};
      border:1px solid ${accentBorder};
      border-radius:16px;
      padding:20px;
      text-align:center;
      margin-bottom:16px;
      position:relative;
      overflow:hidden;
    ">
      <div style="
        position:absolute;top:-30px;right:-30px;
        width:100px;height:100px;
        background:${accentColor};
        opacity:.06;border-radius:50%;
      "></div>
      <div style="font-size:11px;font-weight:800;color:${accentColor};text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px">
        ${typeIcon} ${typeLabel}

    <!-- Info rows -->
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:4px 16px;margin-bottom:20px">

function updateTxTypeUI() {
  const type = document.getElementById('tx-type').value;
  const anhGroup = document.getElementById('tx-anh-group');
  const emLabel  = document.getElementById('tx-em-label');
  if(type === 'out') {
    anhGroup.style.display = 'none';
    document.getElementById('tx-anh').value = 0;
    emLabel.textContent = '💗 Em thanh toán (₫)';
  } else {
    anhGroup.style.display = '';
    emLabel.textContent = '💗 Em đóng (₫)';
  }
}

function openTxModal(txId, quyKey) {
  S.editTxId    = txId || null;
  S.editTxQuyId = quyKey;
  document.getElementById('modal-tx-title').textContent = txId ? 'Sửa Giao Dịch' : 'Thêm Giao Dịch';

  if(txId) {
    const q   = S.quyCache[quyKey];
    const tx  = (q?.transactions||[]).find(t => t.id === txId);
    if(tx) {
      document.getElementById('tx-date').value = tx.date || today();
      document.getElementById('tx-type').value = tx.type;
      document.getElementById('tx-desc').value = tx.description || '';
      document.getElementById('tx-anh').value  = tx.amount_anh || '';
      document.getElementById('tx-em').value   = tx.amount_em  || '';
      document.getElementById('tx-cat').value  = tx.category || '';
      document.getElementById('tx-note').value = tx.note || '';
    }
  } else {
    document.getElementById('tx-date').value = today();
    document.getElementById('tx-type').value = 'in';
    document.getElementById('tx-desc').value = '';
    document.getElementById('tx-anh').value  = '';
    document.getElementById('tx-em').value   = '';
    document.getElementById('tx-cat').value  = '';
    document.getElementById('tx-note').value = '';
  }
  updateTxTypeUI();
  openModalById('modal-tx');
}

async function saveTx() {
  const btn    = document.getElementById('btn-save-tx');
  const quyKey = S.editTxQuyId;
  const q      = S.quyCache[quyKey];
  if(!q) return;

  const txData = {
    date:        document.getElementById('tx-date').value,
    type:        document.getElementById('tx-type').value,
    description: document.getElementById('tx-desc').value.trim(),
    amount_anh:  parseFloat(document.getElementById('tx-anh').value) || 0,
    amount_em:   parseFloat(document.getElementById('tx-em').value)  || 0,
    category:    document.getElementById('tx-cat').value.trim(),
    note:        document.getElementById('tx-note').value.trim(),
  };
  if(!txData.date) { toast('Vui lòng chọn ngày!','error'); return; }
  if(!txData.description) { toast('Vui lòng nhập mô tả!','error'); return; }

  await withLoading(btn, async () => {
    if(S.editTxId) {
      await updateQuyTx(S.editTxId, txData);
      const idx = q.transactions.findIndex(t => t.id === S.editTxId);
      if(idx>=0) q.transactions[idx] = { ...q.transactions[idx], ...txData };
    } else {
      const newTx = await addQuyTx(q.id, txData);
      q.transactions.push(newTx);
    }
    closeModalById('modal-tx');
    renderQuy(quyKey);
  }, '✅ Đã lưu giao dịch!');
}

async function confirmDeleteTx(txId, quyKey) {
  if(!confirm('Xóa giao dịch này?')) return;
  const q = S.quyCache[quyKey];
  try {
    await deleteQuyTx(txId);
    q.transactions = q.transactions.filter(t => t.id !== txId);
    renderQuy(quyKey);
    toast('Đã xóa giao dịch');
  } catch(e) {
    toast(e.message||'Có lỗi xảy ra','error');
  }
}

// ── QUY CONFIG MODAL ─────────────────────────────────────
function openQuyConfig(quyKey) {
  S.editCfgQuyId = quyKey;
  const q = S.quyCache[quyKey];
  if(!q) return;
  document.getElementById('cfg-name').value   = q.name || '';
  document.getElementById('cfg-icon').value   = q.icon || '';
  document.getElementById('cfg-color').value  = q.color || '#f9a825';
  document.getElementById('cfg-target').value = q.target || '';
  openModalById('modal-quy-cfg');
}

async function saveQuyConfig() {
  const btn    = document.getElementById('btn-save-cfg');
  const quyKey = S.editCfgQuyId;
  const q      = S.quyCache[quyKey];
  if(!q) return;
  const cfg = {
    name:   document.getElementById('cfg-name').value.trim(),
    icon:   document.getElementById('cfg-icon').value.trim(),
    color:  document.getElementById('cfg-color').value,
    target: parseFloat(document.getElementById('cfg-target').value) || 0,
  };
  await withLoading(btn, async () => {
    await saveQuyConfigData(q.id, cfg);
    Object.assign(q, cfg);
    closeModalById('modal-quy-cfg');
    // Update sidebar icon
    const navEl = document.getElementById('nav-'+quyKey);
    if(navEl) {
      const iconEl = navEl.querySelector('.nav-icon');
      if(iconEl) iconEl.textContent = cfg.icon;
      navEl.childNodes.forEach(n => { if(n.nodeType===3) n.textContent = ' '+cfg.name; });
    }
    renderQuy(quyKey);
  }, '✅ Đã lưu cài đặt!');
}

// ── MODAL UTILS ──────────────────────────────────────────
function openModalById(id) {
  document.getElementById(id).classList.add('open');
}
function closeModalById(id) {
  document.getElementById(id).classList.remove('open');
}
function closeModal(e, id) {
  if(e.target === e.currentTarget) closeModalById(id);
}

// ── LOADING / TOAST ──────────────────────────────────────
async function withLoading(btn, fn, successMsg) {
  const orig = btn.innerHTML;
  btn.innerHTML = `<div class="spinner ${btn.className.includes('btn-quy')||btn.className.includes('btn-em')?'white':''}"></div>`;
  btn.disabled  = true;
  try {
    await fn();
    toast(successMsg || '✅ Thành công!');
  } catch(e) {
    console.error(e);
    toast(e.message || 'Có lỗi xảy ra', 'error');
  } finally {
    btn.innerHTML = orig;
    btn.disabled  = false;
  }
}

function toast(msg, type='success') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span><button class="toast-dismiss" onclick="this.parentElement.remove()">✕</button>`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
